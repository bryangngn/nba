<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBA Intelligence Hub</title>
    <style>
        :root {
            --bg-body: #0a0f1a;
            --bg-card: #161e2d;
            --text-main: #e2e8f0;
            --text-dim: #94a3b8;
            --accent: #38bdf8;
            --border: #2d3748;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            padding: 10px;
        }

        h1 { text-align: center; color: var(--accent); font-size: 1.2rem; margin: 10px 0; text-transform: uppercase; letter-spacing: 2px; }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 15px;
        }

        .section {
            background: var(--bg-card);
            border-radius: 10px;
            border: 1px solid var(--border);
            height: 88vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .section-header {
            padding: 12px 15px;
            background: #1e293b;
            border-bottom: 2px solid var(--accent);
            font-weight: bold;
            font-size: 0.85rem;
        }

        .feed-container {
            flex-grow: 1;
            overflow-y: auto;
        }

        .news-item {
            display: flex;
            gap: 12px;
            padding: 12px;
            text-decoration: none;
            color: inherit;
            border-bottom: 1px solid var(--border);
            transition: 0.2s;
        }

        .news-item:hover { background: rgba(56, 189, 248, 0.07); }

        .thumb {
            width: 85px;
            height: 60px;
            border-radius: 6px;
            /* Cambiado a contain para que los logos no se corten */
            object-fit: contain; 
            background: #000;
            flex-shrink: 0;
            padding: 2px;
        }

        .news-content { 
            flex-grow: 1;
            display: flex; 
            flex-direction: column; 
            justify-content: space-between;
        }

        .news-title {
            font-size: 0.85rem;
            font-weight: 500;
            line-height: 1.3;
            margin-bottom: 6px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .news-meta {
            font-size: 0.72rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-dim);
        }

        .source-tag { 
            color: var(--accent); 
            font-weight: bold; 
            font-size: 0.65rem;
            background: rgba(56, 189, 248, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
        }

        .x-list { padding: 8px; display: flex; flex-wrap: wrap; gap: 5px; background: #0f172a; border-bottom: 1px solid var(--border); }
        .x-link {
            background: #27272a;
            color: #fff;
            text-decoration: none;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.65rem;
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body>

<h1>🏀 NBA Intelligence Hub</h1>

<div class="dashboard-grid">
    <div class="section"><div class="section-header">📝 MEDIOS ESPAÑA</div><div class="feed-container" id="news-es"></div></div>
    <div class="section"><div class="section-header">📝 MEDIOS USA</div><div class="feed-container" id="news-usa"></div></div>
    <div class="section"><div class="section-header">✉️ NEWSLETTERS</div><div class="feed-container" id="news-subs"></div></div>
    
    <div class="section">
        <div class="section-header">🐦 X ESPAÑA</div>
        <div class="x-list">
            <a href="https://x.com/KikeGarcia41" target="_blank" class="x-link">@KikeGarcia41</a>
            <a href="https://x.com/S_Rabinal" target="_blank" class="x-link">@S_Rabinal</a>
            <a href="https://x.com/alejandroggoNBA" target="_blank" class="x-link">@alejandroggoNBA</a>
            <a href="https://x.com/VictorArrufat" target="_blank" class="x-link">@VictorArrufat</a>
            <a href="https://x.com/Losilla_" target="_blank" class="x-link">@Losilla_</a>
            <a href="https://x.com/GVazquezNY" target="_blank" class="x-link">@GVazquezNY</a>
        </div>
        <div class="feed-container"><a class="twitter-timeline" data-theme="dark" href="https://twitter.com/alejandroggoNBA"></a></div>
    </div>

    <div class="section">
        <div class="section-header">🐦 X USA</div>
        <div class="x-list">
            <a href="https://x.com/ShamsCharania" target="_blank" class="x-link">@ShamsCharania</a>
            <a href="https://x.com/TheDunkCentral" target="_blank" class="x-link">@TheDunkCentral</a>
            <a href="https://x.com/LegionHoops" target="_blank" class="x-link">@LegionHoops</a>
            <a href="https://x.com/RealGM" target="_blank" class="x-link">@RealGM</a>
            <a href="https://x.com/hoopshype" target="_blank" class="x-link">@hoopshype</a>
            <a href="https://x.com/CBSSportsNBA" target="_blank" class="x-link">@CBSSportsNBA</a>
        </div>
        <div class="feed-container"><a class="twitter-timeline" data-theme="dark" href="https://twitter.com/ShamsCharania"></a></div>
    </div>
</div>

<script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>

<script>
    const CONFIG = {
        ES: ['https://www.nbamaniacs.com/feed/', 'https://www.gigantes.com/nba/feed', 'https://e00-marca.uecdn.es/rss/baloncesto/nba.xml', 'https://www.mundodeportivo.com/feed/rss/baloncesto/nba', 'https://www.sport.es/es/rss/nba/rss.xml', 'https://feeds.as.com/mrss-s/pages/as/site/as.com/section/baloncesto/subsection/nba/'],
        USA: ['https://www.espn.com/espn/rss/nba/news', 'https://www.cbssports.com/rss/headlines/nba/', 'https://basketball.realgm.com/rss/wiretap/0/0.xml', 'https://www.hoopsrumors.com/feed', 'https://hoopswire.com/feed/', 'https://sports.yahoo.com/nba/rss/'],
        SUBS: ['https://www.nbaconcontexto.com/feed', 'https://alejandroggo.com/feed', 'https://marcstein.substack.com/feed', 'https://www.roycewebb.com/feed', 'https://www.tomthefinder.com/feed', 'https://www.basketballintelligence.net/feed', 'https://www.truehoop.com/feed']
    };

    function getOfficialLogo(source) {
        // Enlaces a logos oficiales alojados en wikimedia o CDNs estables
        if (source.includes('HOOPS RUMORS')) return 'https://www.hoopsrumors.com/favicon.ico';
        if (source.includes('ESPN')) return 'https://upload.wikimedia.org/wikipedia/commons/thumb/6/60/ESPN_logos.png/800px-ESPN_logos.png';
        if (source.includes('YAHOO')) return 'https://upload.wikimedia.org/wikipedia/commons/thumb/a/a5/Yahoo_Sports_New_Logo.png/800px-Yahoo_Sports_New_Logo.png';
        return null;
    }

    function cleanSourceName(name, url) {
        const u = url.toLowerCase();
        if (u.includes('mundodeportivo')) return 'MUNDO DEPORTIVO';
        if (u.includes('sport.es')) return 'SPORT';
        if (u.includes('marca.com')) return 'MARCA';
        if (u.includes('as.com')) return 'AS';
        if (u.includes('gigantes.com')) return 'GIGANTES';
        if (u.includes('nbamaniacs')) return 'NBA MANIACS';
        if (u.includes('yahoo.com')) return 'YAHOO! SPORTS';
        if (u.includes('espn')) return 'ESPN';
        if (u.includes('cbssports')) return 'CBS SPORTS';
        if (u.includes('realgm')) return 'REALGM';
        if (u.includes('hoopsrumors')) return 'HOOPS RUMORS';
        if (u.includes('hoopswire')) return 'HOOPS WIRE';
        if (u.includes('nbaconcontexto')) return 'NBA CON CONTEXTO';
        if (u.includes('alejandroggo')) return 'GAITÁN';
        if (u.includes('substack')) return 'SUBSTACK';
        return name.toUpperCase().substring(0, 15);
    }

    async function loadFeeds(urls, containerId) {
        const container = document.getElementById(containerId);
        container.innerHTML = '<div style="padding:20px; color:#555; font-size:0.8rem;">Actualizando...</div>';
        
        let allEntries = [];
        const promises = urls.map(url => 
            fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}`)
            .then(res => res.json())
            .then(data => {
                if(data.items) {
                    data.items.forEach(item => {
                        const source = cleanSourceName(data.feed.title || 'NBA', url);
                        // Primero intenta miniatura del feed, luego logo oficial, luego placeholder
                        const imgUrl = item.thumbnail || item.enclosure.link || getOfficialLogo(source) || 'https://via.placeholder.com/85x60/161e2d/38bdf8?text=NBA';
                        allEntries.push({
                            title: item.title,
                            link: item.link,
                            pubDate: new Date(item.pubDate),
                            source: source,
                            img: imgUrl
                        });
                    });
                }
            }).catch(() => {})
        );

        await Promise.all(promises);
        allEntries.sort((a, b) => b.pubDate - a.pubDate);

        container.innerHTML = allEntries.map(item => `
            <a href="${item.link}" target="_blank" class="news-item">
                <img src="${item.img}" class="thumb" onerror="this.src='https://via.placeholder.com/85x60/161e2d/38bdf8?text=NBA'">
                <div class="news-content">
                    <span class="news-title">${item.title}</span>
                    <div class="news-meta">
                        <span class="source-tag">${item.source}</span>
                        <span>${item.pubDate.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})} • ${item.pubDate.toLocaleDateString([], {day:'2-digit', month:'short'})}</span>
                    </div>
                </div>
            </a>
        `).join('');
    }

    loadFeeds(CONFIG.ES, 'news-es');
    loadFeeds(CONFIG.USA, 'news-usa');
    loadFeeds(CONFIG.SUBS, 'news-subs');
</script>
</body>
</html>
