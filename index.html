<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NBA Dashboard | Ultimate Edition</title>
<style>
:root { 
    --bg-body: #050a14; 
    --bg-card: rgba(22, 30, 45, 0.4); 
    --text-main: #f1f5f9; 
    --text-dim: #94a3b8; 
    --accent: #38bdf8; 
    --border: rgba(255, 255, 255, 0.08);
}

body { 
    font-family: 'Inter', sans-serif; 
    background: radial-gradient(circle at top right, #1e293b, #050a14);
    background-attachment: fixed;
    color: var(--text-main); 
    margin: 0; display: flex; flex-direction: column; min-height: 100vh;
}

h1 { text-align: center; color: var(--accent); font-size: 1.5rem; padding: 25px 0; text-transform: uppercase; letter-spacing: 4px; font-weight: 900; margin: 0; }

.dashboard-grid { 
    display: grid; 
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
    gap: 20px; padding: 0 20px 20px 20px; flex-grow: 1; 
}

.section { 
    background: var(--bg-card); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border-radius: 20px; border: 1px solid var(--border); 
    height: 78vh; display: flex; flex-direction: column; overflow: hidden; position: relative;
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
}

.section-header { 
    padding: 18px; background: rgba(30, 41, 59, 0.7); border-bottom: 1px solid var(--border); 
    font-weight: 800; font-size: 0.85rem; text-align: center; letter-spacing: 2px; color: var(--accent);
    display: flex; align-items: center; justify-content: center; gap: 12px;
}

.feed-container { flex-grow: 1; overflow-y: auto; scroll-behavior: smooth; }

/* ANIMACIÓN CASCADA */
.news-item { 
    display: flex; gap: 14px; padding: 18px; text-decoration: none; color: inherit; 
    border-bottom: 1px solid var(--border); transition: 0.3s;
    opacity: 0; transform: translateY(20px);
}
.news-item.animate { animation: slideIn 0.5s ease forwards; }
@keyframes slideIn { to { opacity: 1; transform: translateY(0); } }
.news-item:hover { background: rgba(255, 255, 255, 0.05); }

.thumb { width: 80px; height: 60px; border-radius: 8px; object-fit: cover; background: #000; flex-shrink: 0; }

.news-content { flex-grow: 1; }
.news-title { font-size: 0.9rem; font-weight: 600; line-height: 1.4; margin-bottom: 5px; display: block; }
.news-meta { font-size: 0.7rem; color: var(--text-dim); display: flex; justify-content: space-between; }

.source-tag { background: rgba(56, 189, 248, 0.1); color: var(--accent); padding: 2px 6px; border-radius: 4px; font-weight: 700; }

.refresh-fab {
    position: fixed; right: 30px; bottom: 30px; width: 55px; height: 55px; background: var(--accent);
    border-radius: 50%; border: none; cursor: pointer; box-shadow: 0 8px 20px rgba(56, 189, 248, 0.4); z-index: 100; font-size: 1.5rem;
}

@media (max-width: 768px) {
    .section { display: none; }
    .section.active { display: flex; }
    .mobile-nav { display: flex; position: fixed; bottom: 0; width: 100%; background: #1e293b; padding: 10px 0; justify-content: space-around; z-index: 1000; }
}
</style>
</head>
<body>

<h1>🏀 NBA Dashboard</h1>

<button class="refresh-fab" onclick="refreshAll()">🔄</button>

<div class="dashboard-grid">
    <div class="section active" id="sec-es">
        <div class="section-header">🇪🇸 ESPAÑA</div>
        <div class="feed-container" id="news-es"></div>
    </div>
    <div class="section" id="sec-usa">
        <div class="section-header">🇺🇸 USA</div>
        <div class="feed-container" id="news-usa"></div>
    </div>
    <div class="section" id="sec-x">
        <div class="section-header">🐦 X-RADAR (LIVE)</div>
        <div class="feed-container" id="news-x"></div>
    </div>
    <div class="section" id="sec-subs">
        <div class="section-header">📩 NEWSLETTERS</div>
        <div class="feed-container" id="news-subs"></div>
    </div>
</div>

<script>
const CONFIG = {
    ES: ['https://www.nbamaniacs.com/feed/', 'https://www.gigantes.com/nba/feed', 'https://e00-marca.uecdn.es/rss/baloncesto/nba.xml'],
    USA: ['https://www.espn.com/espn/rss/nba/news', 'https://basketball.realgm.com/rss/wiretap/0/0.xml'],
    // Usamos un bridge de Nitter para convertir la lista de X en RSS
    X: ['https://nitter.net/i/lists/2029659731053412762/rss'], 
    SUBS: ['https://www.nbaconcontexto.com/feed', 'https://alejandroggo.com/feed']
};

async function loadSection(urls, containerId) {
    const container = document.getElementById(containerId);
    container.innerHTML = '<div style="padding:20px;text-align:center;opacity:0.5;">Cargando...</div>';
    
    let allItems = [];
    const promises = urls.map(async (url) => {
        try {
            // Usamos un proxy para evitar bloqueos y convertir RSS a JSON
            const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}&api_key=oyeb99p6z8z4vcl9ptf4mqu7v5g2u7quun8vhkky`);
            const data = await res.json();
            if (data.status === 'ok') {
                data.items.forEach(item => {
                    allItems.push({
                        title: item.title.substring(0, 120) + (item.title.length > 120 ? '...' : ''),
                        link: item.link,
                        date: new Date(item.pubDate),
                        source: data.feed.title.substring(0, 15),
                        img: item.thumbnail || item.enclosure?.link || 'https://via.placeholder.com/80x60/161e2d/38bdf8?text=NBA'
                    });
                });
            }
        } catch (e) { console.error("Error en feed:", url); }
    });

    await Promise.all(promises);
    allItems.sort((a, b) => b.date - a.date);

    container.innerHTML = allItems.slice(0, 30).map((i, idx) => `
        <a href="${i.link}" target="_blank" class="news-item" style="animation-delay: ${idx * 0.05}s">
            <img src="${i.img}" class="thumb">
            <div class="news-content">
                <span class="news-title">${i.title}</span>
                <div class="news-meta">
                    <span class="source-tag">${i.source}</span>
                    <span>${i.date.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                </div>
            </div>
        </a>
    `).join('');

    setTimeout(() => {
        container.querySelectorAll('.news-item').forEach(el => el.classList.add('animate'));
    }, 50);
}

function refreshAll() {
    loadSection(CONFIG.ES, 'news-es');
    loadSection(CONFIG.USA, 'news-usa');
    loadSection(CONFIG.X, 'news-x');
    loadSection(CONFIG.SUBS, 'news-subs');
}

window.onload = refreshAll;
</script>
</body>
</html>
