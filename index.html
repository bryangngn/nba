<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NBA Dashboard flags</title>
<style>
:root { 
    --bg-body: #050a14; 
    --bg-card: rgba(22, 30, 45, 0.7); 
    --text-main: #f1f5f9; 
    --text-dim: #94a3b8; 
    --accent: #38bdf8; 
    --border: rgba(255, 255, 255, 0.08);
    --live: #ef4444;
}

body { 
    font-family: 'Inter', 'Segoe UI', sans-serif; 
    background: radial-gradient(circle at top right, #1e293b, #050a14);
    color: var(--text-main); 
    margin: 0; padding: 0; 
    display: flex; flex-direction: column; 
    min-height: 100vh;
}

h1 { 
    text-align: center; color: var(--accent); font-size: 1.5rem; 
    margin: 20px 0; text-transform: uppercase; letter-spacing: 4px; 
    font-weight: 900; text-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
}

.dashboard-grid { 
    display: grid; 
    grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); 
    gap: 20px; padding: 0 20px 20px 20px; flex-grow: 1; 
}

.section { 
    background: var(--bg-card); 
    backdrop-filter: blur(12px);
    border-radius: 16px; 
    border: 1px solid var(--border); 
    height: 78vh; display: flex; flex-direction: column; 
    overflow: hidden;
    transition: border-color 0.3s ease;
}

.section:hover { border-color: rgba(56, 189, 248, 0.3); }

.section-header { 
    padding: 16px; 
    background: rgba(30, 41, 59, 0.6);
    border-bottom: 1px solid var(--border); 
    font-weight: 800; font-size: 0.85rem; text-align: center; 
    letter-spacing: 2px; color: var(--accent);
    display: flex; align-items: center; justify-content: center; gap: 10px;
}

.feed-container { flex-grow: 1; overflow-y: auto; scroll-behavior: smooth; }

.news-item { 
    display: flex; gap: 14px; padding: 15px; 
    text-decoration: none; color: inherit; 
    border-bottom: 1px solid var(--border); 
    transition: all 0.2s ease;
    animation: fadeIn 0.5s ease forwards;
}

@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

.news-item:hover { background: rgba(255, 255, 255, 0.03); padding-left: 18px; }

.thumb { 
    width: 90px; height: 65px; border-radius: 8px; 
    object-fit: contain; background: #000; 
    flex-shrink: 0; padding: 4px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
}

.news-content { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; }
.news-title { font-size: 0.9rem; font-weight: 600; line-height: 1.4; margin-bottom: 8px; }

.news-meta { font-size: 0.7rem; display: flex; justify-content: space-between; align-items: center; color: var(--text-dim); }

.live-dot {
    display: inline-block; width: 8px; height: 8px; 
    background: var(--live); border-radius: 50%; margin-right: 5px;
    animation: blink 1.5s infinite;
}
@keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

.refresh-fab {
    position: fixed; right: 30px; bottom: 30px;
    width: 50px; height: 50px; background: var(--accent);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    cursor: pointer; box-shadow: 0 4px 15px rgba(56, 189, 248, 0.4);
    z-index: 200; transition: 0.3s; border: none; font-size: 1.5rem;
}
.refresh-fab:hover { transform: rotate(180deg) scale(1.1); }

footer { text-align: center; padding: 20px; font-size: 0.75rem; color: var(--text-dim); }
footer strong { color: var(--accent); }

@media (max-width: 768px) {
    .dashboard-grid { display: block; padding: 0 10px 80px 10px; }
    .section { display: none; height: 78vh; border-radius: 0; border: none; background: transparent; }
    .section.active { display: flex; }
    .mobile-nav { display: flex; position: fixed; bottom: 0; left: 0; width: 100%; background: #1e293b; border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 12px 0; z-index: 1000; }
    .nav-btn { background: none; border: none; color: var(--text-dim); font-size: 0.7rem; font-weight: 800; text-transform: uppercase; display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .nav-btn.active { color: var(--accent); }
    .refresh-fab { bottom: 85px; right: 20px; width: 45px; height: 45px; }
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
</style>
</head>
<body>

<h1>🏀 NBA Dashboard</h1>

<button class="refresh-fab" onclick="refreshAll()" title="Refrescar noticias">🔄</button>

<div class="dashboard-grid">
    <div class="section active" id="sec-es">
        <div class="section-header"><span>🇪🇸</span> ESPAÑA</div>
        <div class="feed-container" id="news-es"></div>
    </div>
    <div class="section" id="sec-usa">
        <div class="section-header"><span>🇺🇸</span> USA</div>
        <div class="feed-container" id="news-usa"></div>
    </div>
    <div class="section" id="sec-subs">
        <div class="section-header"><span>📩</span> NEWSLETTERS</div>
        <div class="feed-container" id="news-subs"></div>
    </div>
</div>

<footer>
    By <strong>Bryan García</strong> | Developed with <strong>Gemini</strong>
</footer>

<div class="mobile-nav" id="m-nav" style="display: none;">
    <button class="nav-btn active" onclick="showTab('es', this)"><span>🇪🇸</span><span>España</span></button>
    <button class="nav-btn" onclick="showTab('usa', this)"><span>🇺🇸</span><span>USA</span></button>
    <button class="nav-btn" onclick="showTab('subs', this)"><span>📩</span><span>Subs</span></button>
</div>

<script>
const LOGOS = {
    'MARCA': 'https://play-lh.googleusercontent.com/pap31KXKXxCEjD5_Gp4hsBRS-_dqtdyt7n_k8TbwgPpKZLPUt1ISOTkqknNkqVF_JA',
    'AS': 'https://dralbertomarques.com/wp-content/uploads/2018/07/diario-as-logo.png',
    'MUNDO DEPORTIVO': 'https://yt3.googleusercontent.com/ytc/AIdro_nrOoV6h3uwn9ibMng6T7G1_KiAmm6aryUC6ET-CqRJv9g=s900-c-k-c0x00ffffff-no-rj',
    'SPORT': 'https://play-lh.googleusercontent.com/IOv18_vqmMbEhETpb4wFIrskC2VyTEqeL8fi51BqYXLy9y4zm-2MjcuYveq4ob9GoV9p',
    'NBA MANIACS': 'https://pbs.twimg.com/profile_images/1891114075666407424/eqdnOr7G_400x400.jpg',
    'GIGANTES': 'https://yt3.googleusercontent.com/ytc/AIdro_n1bU-xv4h6TkWsAeMQyvSWmb4eOeEMqMzNFQRRcduzjno=s900-c-k-c0x00ffffff-no-rj',
    'ESPN': 'https://espnpressroom.com/us/files/2018/03/App-Icon-iOS-150x150.png',
    'YAHOO! SPORTS': 'https://static.wikia.nocookie.net/logopedia/images/1/19/Yahoosports.jpg',
    'HOOPS RUMORS': 'https://cdn.mlbtraderumors.com/files/old/6a00d834515b9a69e2016300dc5dae970d-pi.jpg',
    'HOOPS WIRE': 'https://i0.wp.com/hoopswire.com/wp-content/uploads/2025/06/hoopswire.jpg',
    'CBS SPORTS': 'https://sports.cbsimg.net/images/cbss/ui5/cbssportsv2_200x200.png',
    'REALGM': 'https://play-lh.googleusercontent.com/KwTsScdBMdnuBa5lvQFParYv7h5QesoixFL-K9P8E-SgI8pLyyR1U4WXPWCT7FV9_8g'
};

const CONFIG = {
    ES: ['https://www.nbamaniacs.com/feed/', 'https://www.gigantes.com/nba/feed', 'https://e00-marca.uecdn.es/rss/baloncesto/nba.xml', 'https://www.mundodeportivo.com/feed/rss/baloncesto/nba', 'https://www.sport.es/es/rss/nba/rss.xml', 'https://feeds.as.com/mrss-s/pages/as/site/as.com/section/baloncesto/subsection/nba/'],
    USA: ['https://www.espn.com/espn/rss/nba/news', 'https://www.cbssports.com/rss/headlines/nba/', 'https://basketball.realgm.com/rss/wiretap/0/0.xml', 'https://www.hoopsrumors.com/feed', 'https://hoopswire.com/feed/', 'https://sports.yahoo.com/nba/rss/'],
    SUBS: ['https://www.nbaconcontexto.com/feed', 'https://alejandroggo.com/feed', 'https://marcstein.substack.com/feed', 'https://www.roycewebb.com/feed', 'https://www.tomthefinder.com/feed', 'https://www.basketballintelligence.net/feed', 'https://www.truehoop.com/feed']
};

function cleanName(u) {
    const l = u.toLowerCase();
    if (l.includes('marca.com') || l.includes('uecdn.es')) return 'MARCA'; 
    if (l.includes('mundodeportivo')) return 'MUNDO DEPORTIVO';
    if (l.includes('sport.es')) return 'SPORT';
    if (l.includes('as.com')) return 'AS';
    if (l.includes('gigantes.com')) return 'GIGANTES';
    if (l.includes('nbamaniacs')) return 'NBA MANIACS';
    if (l.includes('yahoo.com')) return 'YAHOO! SPORTS';
    if (l.includes('espn')) return 'ESPN';
    if (l.includes('cbssports')) return 'CBS SPORTS';
    if (l.includes('realgm')) return 'REALGM';
    if (l.includes('hoopsrumors')) return 'HOOPS RUMORS';
    if (l.includes('hoopswire')) return 'HOOPS WIRE';
    if (l.includes('basketballintelligence')) return 'BASKETBALL INTELLIGENCE';
    if (l.includes('roycewebb')) return 'ROYCE WEBB';
    if (l.includes('alejandroggo')) return 'ALEJANDRO GAITÁN';
    if (l.includes('tomthefinder')) return 'TOM HABERSTROH';
    if (l.includes('nbaconcontexto')) return 'NBA CON CONTEXTO';
    if (l.includes('marcstein')) return 'MARC STEIN';
    if (l.includes('truehoop')) return 'TRUEHOOP';
    return "NBA";
}

function showTab(type, btn) {
    if (window.innerWidth > 768) return;
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(`sec-${type}`).classList.add('active');
    btn.classList.add('active');
}

async function loadSection(urls, containerId) {
    const container = document.getElementById(containerId);
    container.innerHTML = '<div style="padding:40px; text-align:center; opacity:0.5; font-size:0.8rem;">Sincronizando señales...</div>';
    
    let allItems = [];
    const promises = urls.map(async (url) => {
        try {
            const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}&t=${Date.now()}`);
            const data = await res.json();
            if (data.status === 'ok') {
                const sName = cleanName(url);
                data.items.forEach(item => {
                    allItems.push({
                        title: item.title,
                        link: item.link,
                        date: new Date(item.pubDate),
                        source: sName,
                        img: LOGOS[sName] || item.thumbnail || (item.enclosure && item.enclosure.link) || ""
                    });
                });
            }
        } catch (e) { console.error("Error:", url); }
    });

    await Promise.all(promises);
    allItems.sort((a, b) => b.date - a.date);

    const now = new Date();

    container.innerHTML = allItems.map(i => {
        const isNew = (now - i.date) < 3600000;
        const dStr = i.date.toLocaleDateString([], {day:'2-digit', month:'short'});
        const tStr = i.date.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        
        return `
        <a href="${i.link}" target="_blank" class="news-item">
            <img src="${i.img || 'https://via.placeholder.com/90x65/161e2d/38bdf8?text=NBA'}" class="thumb">
            <div class="news-content">
                <span class="news-title">${i.title}</span>
                <div class="news-meta">
                    <span class="source-tag">${i.source}</span>
                    <span>${isNew ? '<span class="live-dot"></span>' : ''}${dStr} • ${tStr}</span>
                </div>
            </div>
        </a>`;
    }).join('');
}

function refreshAll() {
    loadSection(CONFIG.ES, 'news-es');
    loadSection(CONFIG.USA, 'news-usa');
    loadSection(CONFIG.SUBS, 'news-subs');
}

window.onload = () => {
    if(window.innerWidth <= 768) document.getElementById('m-nav').style.display = 'flex';
    refreshAll();
};
</script>
</body>
</html>
