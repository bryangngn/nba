<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NBA Intelligence Hub fecha</title>
<style>
:root { --bg-body: #0a0f1a; --bg-card: #161e2d; --text-main: #e2e8f0; --text-dim: #94a3b8; --accent: #38bdf8; --border: #2d3748; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg-body); color: var(--text-main); margin: 0; padding: 0; }

h1 { text-align: center; color: var(--accent); font-size: 1.2rem; margin: 15px 0; text-transform: uppercase; letter-spacing: 2px; }

/* Grid principal */
.dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 15px; padding: 10px; padding-bottom: 20px; }

.section { background: var(--bg-card); border-radius: 10px; border: 1px solid var(--border); height: 85vh; display: flex; flex-direction: column; overflow: hidden; }
.section-header { padding: 12px 15px; background: #1e293b; border-bottom: 2px solid var(--accent); font-weight: bold; font-size: 0.85rem; text-align: center; }

.feed-container { flex-grow: 1; overflow-y: auto; }

/* Items de noticias */
.news-item { display: flex; gap: 12px; padding: 12px; text-decoration: none; color: inherit; border-bottom: 1px solid var(--border); transition: 0.2s; }
.news-item:hover { background: rgba(56, 189, 248, 0.07); }
.thumb { width: 85px; height: 60px; border-radius: 6px; object-fit: contain; background: #000; flex-shrink: 0; padding: 5px; }
.news-content { flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
.news-title { font-size: 0.85rem; font-weight: 500; line-height: 1.3; margin-bottom: 6px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.news-meta { font-size: 0.72rem; display: flex; justify-content: space-between; align-items: center; color: var(--text-dim); }
.source-tag { color: var(--accent); font-weight: bold; font-size: 0.65rem; background: rgba(56, 189, 248, 0.1); padding: 2px 6px; border-radius: 4px; }

/* Barra de navegación móvil */
.mobile-nav { display: none; position: fixed; bottom: 0; left: 0; width: 100%; background: #1e293b; border-top: 2px solid var(--accent); z-index: 100; justify-content: space-around; padding: 10px 0; }
.nav-btn { background: none; border: none; color: var(--text-dim); font-size: 0.7rem; font-weight: bold; text-transform: uppercase; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; transition: 0.3s; }
.nav-btn.active { color: var(--accent); }

/* Media Query para móviles */
@media (max-width: 768px) {
    h1 { font-size: 1rem; margin: 10px 0; }
    .dashboard-grid { display: block; padding: 0; padding-bottom: 70px; } 
    .section { display: none; height: 82vh; border-radius: 0; border: none; }
    .section.active { display: flex; }
    .mobile-nav { display: flex; }
    .news-meta { font-size: 0.68rem; } /* Ligeramente más pequeño en móvil */
}

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
</style>
</head>
<body>

<h1>🏀 NBA Intelligence Hub</h1>

<div class="dashboard-grid">
    <div class="section active" id="sec-es">
        <div class="section-header">📝 MEDIOS ESPAÑA</div>
        <div class="feed-container" id="news-es"></div>
    </div>
    <div class="section" id="sec-usa">
        <div class="section-header">📝 MEDIOS USA</div>
        <div class="feed-container" id="news-usa"></div>
    </div>
    <div class="section" id="sec-subs">
        <div class="section-header">✉️ NEWSLETTERS</div>
        <div class="feed-container" id="news-subs"></div>
    </div>
</div>

<div class="mobile-nav">
    <button class="nav-btn active" onclick="showTab('es', this)"><span>🇪🇸</span><span>España</span></button>
    <button class="nav-btn" onclick="showTab('usa', this)"><span>🇺🇸</span><span>USA</span></button>
    <button class="nav-btn" onclick="showTab('subs', this)"><span>📧</span><span>Subs</span></button>
</div>

<script>
const FALLBACK = "data:image/svg+xml;charset=UTF-8,%3Csvg width='85' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='100%25' height='100%25' fill='%23161e2d'/%3E%3Ctext x='50%25' y='50%25' font-family='sans-serif' font-size='10' fill='%2338bdf8' text-anchor='middle' dy='.3em'%3ENBA%3C/text%3E%3C/svg%3E";

const LOGOS = {
    'MARCA': 'https://play-lh.googleusercontent.com/pap31KXKXxCEjD5_Gp4hsBRS-_dqtdyt7n_k8TbwgPpKZLPUt1ISOTkqknNkqVF_JA',
    'AS': 'https://dralbertomarques.com/wp-content/uploads/2018/07/diario-as-logo.png',
    'MUNDO DEPORTIVO': 'https://yt3.googleusercontent.com/ytc/AIdro_nrOoV6h3uwn9ibMng6T7G1_KiAmm6aryUC6ET-CqRJv9g=s900-c-k-c0x00ffffff-no-rj',
    'SPORT': 'https://play-lh.googleusercontent.com/IOv18_vqmMbEhETpb4wFIrskC2VyTEqeL8fi51BqYXLy9y4zm-2MjcuYveq4ob9GoV9p',
    'NBA MANIACS': 'https://pbs.twimg.com/profile_images/1891114075666407424/eqdnOr7G_400x400.jpg',
    'GIGANTES': 'https://yt3.googleusercontent.com/ytc/AIdro_n1bU-xv4h6TkWsAeMQyvSWmb4eOeEMqMzNFQRRcduzjno=s900-c-k-c0x00ffffff-no-rj',
    'ESPN': 'https://espnpressroom.com/us/files/2018/03/App-Icon-iOS-150x150.png',
    'YAHOO! SPORTS': 'https://static.wikia.nocookie.net/logopedia/images/1/19/Yahoosports.jpg',
    'HOOPS RUMORS': 'https://cdn.mlbtraderumors.com/files/old/6a00d834515b9a69e2016300dc5dae970d-pi.jpg',
    'HOOPS WIRE': 'https://i0.wp.com/hoopswire.com/wp-content/uploads/2025/06/hoopswire.jpg',
    'CBS SPORTS': 'https://sports.cbsimg.net/images/cbss/ui5/cbssportsv2_200x200.png',
    'REALGM': 'https://play-lh.googleusercontent.com/KwTsScdBMdnuBa5lvQFParYv7h5QesoixFL-K9P8E-SgI8pLyyR1U4WXPWCT7FV9_8g'
};

const CONFIG = {
    ES: ['https://www.nbamaniacs.com/feed/', 'https://www.gigantes.com/nba/feed', 'https://e00-marca.uecdn.es/rss/baloncesto/nba.xml', 'https://www.mundodeportivo.com/feed/rss/baloncesto/nba', 'https://www.sport.es/es/rss/nba/rss.xml', 'https://feeds.as.com/mrss-s/pages/as/site/as.com/section/baloncesto/subsection/nba/'],
    USA: ['https://www.espn.com/espn/rss/nba/news', 'https://www.cbssports.com/rss/headlines/nba/', 'https://basketball.realgm.com/rss/wiretap/0/0.xml', 'https://www.hoopsrumors.com/feed', 'https://hoopswire.com/feed/', 'https://sports.yahoo.com/nba/rss/'],
    SUBS: ['https://www.nbaconcontexto.com/feed', 'https://alejandroggo.com/feed', 'https://marcstein.substack.com/feed', 'https://www.roycewebb.com/feed', 'https://www.tomthefinder.com/feed', 'https://www.basketballintelligence.net/feed', 'https://www.truehoop.com/feed']
};

function cleanName(u) {
    const l = u.toLowerCase();
    if (l.includes('marca.com') || l.includes('uecdn.es')) return 'MARCA'; 
    if (l.includes('mundodeportivo')) return 'MUNDO DEPORTIVO';
    if (l.includes('sport.es')) return 'SPORT';
    if (l.includes('as.com')) return 'AS';
    if (l.includes('gigantes.com')) return 'GIGANTES';
    if (l.includes('nbamaniacs')) return 'NBA MANIACS';
    if (l.includes('yahoo.com')) return 'YAHOO! SPORTS';
    if (l.includes('espn')) return 'ESPN';
    if (l.includes('cbssports')) return 'CBS SPORTS';
    if (l.includes('realgm')) return 'REALGM';
    if (l.includes('hoopsrumors')) return 'HOOPS RUMORS';
    if (l.includes('hoopswire')) return 'HOOPS WIRE';
    if (l.includes('basketballintelligence')) return 'BASKETBALL INTELLIGENCE';
    if (l.includes('roycewebb')) return 'ROYCE WEBB';
    if (l.includes('alejandroggo')) return 'ALEJANDRO GAITÁN';
    if (l.includes('tomthefinder')) return 'TOM HABERSTROH';
    if (l.includes('nbaconcontexto')) return 'NBA CON CONTEXTO';
    if (l.includes('marcstein')) return 'MARC STEIN';
    if (l.includes('truehoop')) return 'TRUEHOOP';
    return "NBA";
}

function showTab(type, btn) {
    if (window.innerWidth > 768) return;
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(`sec-${type}`).classList.add('active');
    btn.classList.add('active');
    window.scrollTo(0, 0);
}

async function loadSection(urls, containerId) {
    const container = document.getElementById(containerId);
    container.innerHTML = '<div style="padding:20px;opacity:0.5">Sincronizando...</div>';
    let allItems = [];

    const promises = urls.map(async (url) => {
        try {
            const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}`);
            const data = await res.json();
            if (data.status === 'ok') {
                const sName = cleanName(url);
                data.items.forEach(item => {
                    allItems.push({
                        title: item.title,
                        link: item.link,
                        date: new Date(item.pubDate),
                        source: sName,
                        img: LOGOS[sName] || item.thumbnail || (item.enclosure && item.enclosure.link) || FALLBACK
                    });
                });
            }
        } catch (e) { console.error("Error:", url); }
    });

    await Promise.all(promises);
    
    // ORDENACIÓN: Fecha y Hora descendente (más recientes arriba)
    allItems.sort((a, b) => b.date - a.date);

    container.innerHTML = allItems.map(i => {
        const dStr = i.date.toLocaleDateString([], {day:'2-digit', month:'short'});
        const tStr = i.date.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        return `
        <a href="${i.link}" target="_blank" class="news-item">
            <img src="${i.img}" class="thumb" onerror="this.onerror=null;this.src='${FALLBACK}'">
            <div class="news-content">
                <span class="news-title">${i.title}</span>
                <div class="news-meta">
                    <span class="source-tag">${i.source}</span>
                    <span>${dStr} • ${tStr}</span>
                </div>
            </div>
        </a>`;
    }).join('');
}

window.onload = () => {
    loadSection(CONFIG.ES, 'news-es');
    loadSection(CONFIG.USA, 'news-usa');
    loadSection(CONFIG.SUBS, 'news-subs');
};
</script>
</body>
</html>
